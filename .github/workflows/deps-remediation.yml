name: Security Dependency Remediation

# One-shot, manually triggered job that upgrades dependencies to the latest
# versions allowed by the existing semver ranges (patching known
# vulnerabilities without breaking major bumps), verifies the build still
# passes, and commits the refreshed lockfile.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  remediate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Upgrade dependencies within semver ranges
        run: |
          npm update
          npm audit fix || true
          echo "=== Residual audit report ==="
          npm audit || true

      - name: Verify build still passes
        run: npm run build

      - name: Commit refreshed lockfile if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          if git diff --staged --quiet; then
            echo "No dependency changes to commit."
          else
            git commit -m "Patch dependency vulnerabilities via in-range updates"
            git pull --rebase --autostash origin main
            git push origin main
          fi
